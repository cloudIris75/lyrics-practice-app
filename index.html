<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>작사 연습 앱</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>🎵 작사 연습</h1>
      <p class="subtitle">각 단어의 음절 수를 맞춰보세요</p>
    </header>

    <main>
      <section class="song-info" id="songInfo"></section>

      <section class="quiz-area" id="quizArea"></section>

      <div class="actions">
        <button class="btn btn-check" id="checkBtn" onclick="checkAnswers()">정답 확인</button>
        <button class="btn btn-next" id="nextBtn" onclick="nextSong()" style="display:none">다음 곡</button>
      </div>

      <section class="result" id="result"></section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
