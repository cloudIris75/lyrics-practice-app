<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>작사 연습 앱</title>
  <link rel="stylesheet" href="style.css?v=6" />
</head>
<body>
  <div class="container">
    <header>
      <h1>🎵 작사 연습</h1>
      <p class="subtitle">각 라인의 단어별 음절 수를 띄어쓰기로 입력하세요 &nbsp;·&nbsp; 예) <code>2 1 1 2 1</code></p>
    </header>

    <main>
      <div class="problem-header">
        <span id="problemDate"></span>
      </div>

      <div class="table-wrap">
        <table>
          <tbody id="problemBody"></tbody>
        </table>
      </div>

      <div class="actions">
        <button class="btn btn-check" id="checkBtn"  onclick="checkAnswers()">정답 확인</button>
        <button class="btn btn-retry" id="retryBtn"  onclick="retryWrong()" style="display:none">다시 시도 🔄</button>
        <button class="btn btn-done"  id="doneBtn"   onclick="finishForToday()" style="display:none">오늘 완료 →</button>
      </div>

      <div class="result" id="result"></div>
    </main>
  </div>

  <script src="app.js?v=6"></script>
</body>
</html>
